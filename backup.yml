- name: H3C Backup Playbook
  hosts: all
  gather_facts: no

  tasks:
    - name: Konfiqurasiyani oxu
      cli_command:
        command: display current-configuration
      vars:
        ansible_command_timeout: 300
      register: switch_config

    - name: Fayli Windows qovluguna kopyala
      copy:
        content: "{{ switch_config.stdout }}"
        # Qeyd: 'state: directory' taskını sildik, çünki mount artıq hazırdır
        dest: "/mnt/win_backups/{{ inventory_hostname }}_{{ lookup('pipe', 'date +%Y-%m-%d') }}.cfg"
        # Force: no əlavə edirik ki, icazələri dəyişməyə çalışmasın
        force: yes
      delegate_to: localhost
