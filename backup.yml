- name: H3C Backup Playbook
  hosts: all
  gather_facts: no

  tasks:
    - name: Sehifelemene sondur
      cli_command:
        command: screen-length 0 temporary

    - name: Konfiqurasiyani oxu
      cli_command:
        command: display current-configuration
      vars:
        ansible_command_timeout: 300
      register: switch_config

    - name: Fayli kopyala
      copy:
        content: "{{ switch_config.stdout }}"
        dest: "/tmp/{{ inventory_hostname }}.cfg"
      delegate_to: localhost

    - name: Fayli Windows qovluguna dasi
      shell: "cp /tmp/{{ inventory_hostname }}.cfg /mnt/win_backups/{{ inventory_hostname }}_{{ lookup('pipe', 'date +%Y-%m-%d') }}.cfg"
      delegate_to: localhost
