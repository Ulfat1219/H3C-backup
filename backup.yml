---
- name: H3C Backup (Direct SSH)
  hosts: all
  gather_facts: no

  tasks:
    - name: Konfiqurasiyani oxu
      raw: "screen-length 0 temporary && display current-configuration"
      register: switch_config

    - name: Fayli saxla
      copy:
        content: "{{ switch_config.stdout }}"
        dest: "/tmp/{{ inventory_hostname }}.cfg"
      delegate_to: localhost
