- name: H3C Backup Playbook
  hosts: all
  gather_facts: no

  tasks:
    - name: Konfiqurasiyani oxu
      cli_command:
        command: display current-configuration
      vars:
        ansible_command_timeout: 300
      register: switch_config

    - name: Fayli birbasa Windows qovluguna yaz
      # 'copy' modulu evezine birbasa shell/redirect istifade edirik
      # Bu, qovlugun yoxlanilmasi merhelesini yan kecir
      shell: |
        echo "{{ switch_config.stdout }}" > "/mnt/win_backups/{{ inventory_hostname }}_{{ lookup('pipe', 'date +%Y-%m-%d') }}.cfg"
      delegate_to: localhost
