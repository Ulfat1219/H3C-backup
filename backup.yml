- name: H3C Backup Playbook
  hosts: all
  gather_facts: no

  tasks:
    - name: Konfiqurasiyani oxu
      cli_command:
        # İki əmri bir sətirdə göndəririk (H3C bunu dəstəkləyir)
        command: "screen-length 0 temporary ; display current-configuration"
      vars:
        # Gözləmə müddətini artıraq, amma 300 saniyə kifayət etməlidir
        ansible_command_timeout: 300
      register: switch_config

    - name: Fayli birbasa Windows qovluguna yaz
      shell: |
        echo "{{ switch_config.stdout }}" > "/mnt/win_backups/{{ inventory_hostname }}_{{ lookup('pipe', 'date +%Y-%m-%d') }}.cfg"
      delegate_to: localhost
